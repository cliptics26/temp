name: Build SkyReels V3 Docker Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'vast-worker/Dockerfile.skyreels-v3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cliptics
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./vast-worker
          file: ./vast-worker/Dockerfile.skyreels-v3
          push: true
          tags: |
            cliptics/skyreels-v3:latest
            cliptics/skyreels-v3:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
